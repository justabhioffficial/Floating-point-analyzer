{% extends 'base.html' %}
{% block title %}Login - FP Analyzer{% endblock %}
{% block content %}
<div class="auth-container glass-card slide-up">
    <h2>Welcome Back</h2>
    <p>Sign in to access the Analyzer and your Historical PDF logs.</p>
    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required class="glass-input">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required class="glass-input">
        </div>
        <button type="submit" class="btn-primary full-width pop-animation">Login</button>
    </form>
    <p class="auth-switch">Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
</div>
{% endblock %}
